name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest jsonschema==4.23.0
      - name: Run tests
        run: pytest -q
      - name: Validate DevSecOps Workroom adversarial AIOps fixtures
        run: python scripts/validate_devsecops_workroom_adversarial_aiops.py
